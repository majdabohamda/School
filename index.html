<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختبار التيؤوريا الرسمي - 30 سؤالاً حرفياً</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; padding: 20px; direction: rtl; }
        .quiz-container { max-width: 1000px; margin: auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        h1 { color: #2c3e50; text-align: center; border-bottom: 4px solid #3498db; padding-bottom: 15px; }
        .question-block { background: #fff; border: 1px solid #dee2e6; padding: 20px; margin-bottom: 25px; border-radius: 8px; }
        .question-text { font-size: 1.25em; font-weight: bold; color: #1a1a1a; margin-bottom: 15px; line-height: 1.6; }
        .option-label { display: block; position: relative; padding: 12px 45px 12px 15px; margin: 10px 0; border: 1px solid #ced4da; border-radius: 6px; cursor: pointer; transition: 0.2s; line-height: 1.5; }
        .option-label:hover { background: #e9ecef; }
        .option-label input { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); width: 18px; height: 18px; }
        .footer-action { text-align: center; margin-top: 40px; }
        .btn-submit { background: #3498db; color: white; border: none; padding: 18px 80px; font-size: 1.4em; border-radius: 50px; cursor: pointer; transition: 0.3s; width: 100%; }
        .btn-submit:hover { background: #2980b9; }
        #result-box { margin-top: 30px; padding: 25px; border-radius: 10px; display: none; text-align: center; font-size: 1.6em; font-weight: bold; }
        .passed { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .failed { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>اختبار التيؤوريا الشامل (30 سؤالاً من المجمع الرسمي)</h1>
    <form id="theoryForm">
        <div id="questionsWrapper"></div>
        <div class="footer-action">
            <button type="button" class="btn-submit" onclick="evaluateQuiz()">عرض النتيجة النهائية</button>
        </div>
    </form>
    <div id="result-box"></div>
</div>

<script>
    const fullQuizData = [
        { q: "على مَن يُفرض واجب معرفة قوانين السير والأنظمة التي سُنّت بموجبها، والانصياع لها؟", opts: ["على السائقين الذين يحملون رخص قيادة لمركبات ثقيلة فقط.", "على المشاة فقط عند استخدامهم للطرق السريعة خارج المدينة.", "على كل شخص يستعمل الطريق، سواء كان سائقاً، عابراً سبيل (مشاة)، أو راكباً.", "على أصحاب المركبات فقط، أما السائقون المستأجرون فلا علاقة لهم."], ans: 2 },
        { q: "من يحق له قيادة مركبة بمحرك في الطريق (بما في ذلك الدراجات الكهربائية حسب السن القانونية)؟", opts: ["كل شخص تجاوز سن الـ 16 عاماً ويجيد ركوب الدراجات العادية.", "كل من بحوزته رخصة قيادة سارية المفعول لنفس نوع المركبة التي يقودها، وصادرة عن سلطة الترخيص.", "كل شخص يمتلك مركبة مسجلة باسمه في سلطة الترخيص.", "كل من حصل على تصريح شفهي من مدرب القيادة الخاص به."], ans: 1 },
        { q: "في أية حالة يُمنع السائق من قيادة مركبة من أي نوع كان، حتى لو كان يمتلك رخصة قيادة سارية؟", opts: ["عندما تكون حالته الجسدية أو النفسية لا تمكنه من السيطرة على المركبة أو تشكل خطراً على مستخدمي الطريق.", "عندما تكون درجة الحرارة خارج المركبة تزيد عن 40 درجة مئوية.", "فقط إذا كانت المركبة لم تخضع لغسيل خارجي منذ أكثر من أسبوع.", "لا توجد حالة تمنع صاحب الرخصة من القيادة طالما رخصته في جيبه."], ans: 0 },
        { q: "ما هي درجة الرخصة اللازمة لقيادة مركبة وزنها الإجمالي المسموح به لغاية 3,500 كغم؟", opts: ["رخصة قيادة من الدرجة A المخصصة للدراجات.", "رخصة قيادة من الدرجة C1 المخصصة للشاحنات الخفيفة.", "رخصة قيادة من الدرجة B المخصصة للمركبات الخصوصية والتجارية الخفيفة.", "رخصة قيادة من الدرجة D المخصصة للحافلات."], ans: 2 },
        { q: "ما هي مسؤولية السائق تجاه الركاب الذين يجلسون في المقاعد الخلفية للمركبة؟", opts: ["يجب على السائق التأكد من أن جميع الركاب يرتدون أحزمة الأمان طوال فترة السفر.", "السائق مسؤول فقط عن الركاب في المقعد الأمامي بجانبه.", "السائق غير مسؤول عن الركاب، فالقانون يحاسب الركاب أنفسهم فقط.", "المسؤولية تنحصر في منع الركاب من فتح النوافذ أثناء السير."], ans: 0 },
        { q: "كيف يجب على السائق التصرف عند اقترابه من ممر عبور مشاة غير مجهز بإشارات ضوئية؟", opts: ["زيادة السرعة لتنبيه المشاة بضرورة الابتعاد عن الطريق.", "إعطاء حق الأولوية لكل مشاة بدأ بالعبور، أو ينوي العبور، والتمهل أو التوقف لضمان سلامتهم.", "استخدام الزامور بشكل متواصل حتى يخلي المشاة الطريق.", "التوقف فقط إذا كان المشاة يقطعون الطريق من جهة اليسار فقط."], ans: 1 },
        { q: "ما هو الترتيب القانوني الصحيح للانصياع لوسائل السيطرة على حركة المرور في المفترقات؟", opts: ["الإشارة الضوئية، ثم الشاخصات، ثم أوامر الشرطي، ثم قواعد اليمين.", "أوامر شرطي المرور، ثم الإشارة الضوئية، ثم الشاخصات، ثم القواعد العامة (مثل حق الأولوية لليمين).", "الشاخصات الأرضية، ثم القواعد العامة، ثم الإشارات الضوئية.", "دائماً حق الأولوية لمن يصل للمفترق أولاً بغض النظر عن الوسائل الأخرى."], ans: 1 },
        { q: "ماذا تعني إشارة 'قف' (شاخصة رقم 302) الموجودة قبل مفترق طرق؟", opts: ["التخفيف من السرعة والنظر للتأكد من خلو الطريق ثم المتابعة.", "التوقف التام الإلزامي قبل خط التوقف وإعطاء حق الأولوية للمركبات في الطريق القاطع.", "التوقف فقط في حال وجود مركبات قادمة من جهة اليمين.", "التوقف لمدة ثانية واحدة ثم الانطلاق بسرعة لتجنب الازدحام."], ans: 1 },
        { q: "كيف يجب أن يكون ضغط الهواء في إطارات المركبة؟", opts: ["حسب تقدير السائق وبناءً على شكل الإطار الخارجي.", "حسب ما هو مسجل في كتاب صيانة المركبة أو حسب ملصق الشركة المنتج في إطار باب السائق.", "يجب أن يكون الضغط دائماً 40 درجة لجميع أنواع المركبات.", "يجب فحص الضغط فقط عند استبدال الإطارات القديمة بأخرى جديدة."], ans: 1 },
        { q: "ما هي أهمية وضع مسند الرأس في المقعد بشكل صحيح؟", opts: ["وظيفته جمالية فقط لتعطي طابعاً رياضياً للمركبة.", "منع إصابة الرقبة (إصابة السوط) عند حدوث اصطدام للمركبة من الخلف.", "يستخدم لراحة السائق عند الرغبة في النوم أثناء التوقف.", "يساعد في تثبيت أحزمة الأمان بشكل أفضل حول الكتف."], ans: 1 },
        { q: "ما هو 'تشتت الانتباه' وما هي مسبباته الرئيسية أثناء القيادة؟", opts: ["هو القيام بنشاط يصرف انتباه السائق عن مراقبة الطريق والتحكم في المركبة (مثل استخدام الهاتف).", "هو التركيز الشديد في مراقبة حركة السير في المرايا الجانبية.", "هو الشعور بالملل بسبب القيادة في طرق مستقيمة وطويلة.", "هو النظر إلى لوحة العدادات للتأكد من كمية الوقود."], ans: 0 },
        { q: "ما هي السرعة القصوى في طريق داخل المدن (طريق بلدية) ما لم توجد شاخصة تحدد غير ذلك؟", opts: ["السرعة القصوى هي 30 كم/ساعة.", "السرعة القصوى هي 50 كم/ساعة.", "السرعة القصوى هي 80 كم/ساعة.", "السرعة القصوى هي 90 كم/ساعة."], ans: 1 },
        { q: "كيف يتصرف السائق عند الاقتراب من 'دائرة سير' (دوار)؟", opts: ["حق الأولوية دائماً لمن يدخل الدوار أولاً.", "يجب إعطاء حق الأولوية للمركبات الموجودة داخل الدوار والقادمة من اليسار.", "يجب إعطاء حق الأولوية للقادم من اليمين قبل دخول الدوار.", "زيادة السرعة لدخول الدوار قبل المركبات الأخرى."], ans: 1 },
        { q: "ما معنى وجود 'خط أصفر متواصل' على الجهة اليمنى من الطريق؟", opts: ["يحدد حافة الطريق، ويُحظر تجاوزه أو السير على يساره إلا للضرورة أو في حالة عطل.", "مخصص لسير الدراجات الهوائية فقط.", "يعني أن الطريق أمامك سيصبح ضيقاً جداً.", "يسمح بالوقوف والتنزه وراء هذا الخط في جميع الأوقات."], ans: 0 },
        { q: "ما هي القاعدة العامة لحق الأولوية في مفترق طرق لا توجد فيه شاخصات؟", opts: ["حق الأولوية للمركبة الأكبر حجماً.", "حق الأولوية للمركبة القادمة من جهة اليمين.", "حق الأولوية للمركبة التي تسير في الطريق الأوسع.", "حق الأولوية لمن يطلق الزامور أولاً."], ans: 1 },
        { q: "ماذا تفعل عند سماع صفارة إنذار أو رؤية أضواء طوارئ؟", opts: ["تستمر في السير كالمعتاد ولكن بحذر.", "إخلاء المسلك الذي تسير فيه مركبة الطوارئ فوراً، والتمهل أو التوقف على جانب الطريق.", "تزيد السرعة لتسبق مركبة الطوارئ وتفتح لها الطريق.", "تتوقف فجأة في مكانك وتنتظر مرورها."], ans: 1 },
        { q: "متى يُسمح للسائق باستخدام الهاتف الخليوي أثناء القيادة؟", opts: ["يُسمح باليد عند التوقف في إشارة حمراء.", "فقط بواسطة مكبر صوت (ديسبور) ثابت يمنع لمس الهاتف أو حمله.", "يُسمح بكتابة الرسائل القصيرة إذا كان الطريق خالياً.", "يُسمح باستخدامه فقط عند القيادة في طرق ترابية."], ans: 1 },
        { q: "ما هي وظيفة 'فرامل اليد' (الهاند بريك)؟", opts: ["تثبيت المركبة عند الوقوف التام (الركن) لمنع حركتها.", "تستخدم لزيادة سرعة المركبة عند الانطلاق.", "تستخدم كبديل لفرامل الرجل في جميع الحالات.", "تستخدم لتبريد المحرك عند الوقوف."], ans: 0 },
        { q: "ماذا تفعل إذا بدأت الإشارة الخضراء بالوميض وأنت تقترب من المفترق؟", opts: ["تزيد السرعة لتعبر قبل تحولها للأحمر.", "تخفف السرعة وتستعد للتوقف إذا كنت تستطيع ذلك بأمان قبل خط التوقف.", "تتوقف فوراً حتى لو كنت في وسط المفترق.", "تستمر في السير دون تغيير في السرعة."], ans: 1 },
        { q: "ما هي وظيفة جهاز 'الرادياتير' في المركبة؟", opts: ["تبريد محرك المركبة ومنع ارتفاع حرارته.", "تزويد المحرك بالكهرباء اللازمة.", "تصفية الوقود من الشوائب.", "توليد الهواء للمكيف."], ans: 0 },
        { q: "ما هي أهمية 'مثلث التحذير' عند تعطل المركبة؟", opts: ["يوضع خلف المركبة لتنبيه السائقين الآخرين بوجود عائق وتجنب الاصطدام.", "يوضع فوق سطح المركبة للزينة.", "يوضع بجانب المحرك لإصلاح العطل.", "يوضع في الحقيبة الخلفية ولا حاجة لاستخدامه."], ans: 0 },
        { q: "كيف يؤثر الكحول على قدرة السائق على القيادة؟", opts: ["يزيد من التركيز والقدرة على الرؤية.", "يبطئ رد الفعل، ويشوش تقدير المسافات، ويقلل من السيطرة على المركبة.", "يجعل السائق أكثر حذراً وانتباهاً.", "لا يؤثر على السائقين المحترفين."], ans: 1 },
        { q: "ما هو 'وقت رد الفعل'؟", opts: ["الزمن من لحظة رؤية الخطر حتى لحظة الضغط على الفرامل.", "الزمن اللازم لتوقف المركبة تماماً بعد الضغط على الفرامل.", "الزمن المستغرق في تشغيل المحرك صباحاً.", "الزمن الذي يقضيه السائق في الطريق."], ans: 0 },
        { q: "ماذا تفعل عند رؤية مشاة يقطعون الطريق في مكان غير مخصص للعبور؟", opts: ["تستمر في السير لأنهم يرتكبون مخالفة.", "تخفف السرعة وتعطيهم حق الأولوية حفاظاً على حياتهم.", "تستخدم الزامور لتخويفهم ومنعهم من العبور.", "تزيد السرعة لتمر قبلهم."], ans: 1 },
        { q: "أين يجب وضع الأطفال دون سن الثالثة في المركبة؟", opts: ["في حضن السائق لضمان سلامتهم.", "في مقعد أمان مخصص ومثبت جيداً في المقاعد الخلفية.", "في صندوق المركبة الخلفي.", "واقفين بين المقعدين الأماميين."], ans: 1 },
        { q: "ما هي فائدة 'حزام الأمان'؟", opts: ["منع السائق من الحركة الكثيرة.", "تقليل شدة الإصابة ومنع الاندفاع خارج المركبة عند وقوع حادث.", "حماية المقاعد من التمزق.", "تحسين مظهر السائق."], ans: 1 },
        { q: "ماذا تفعل إذا دخلت في ضباب كثيف أثناء القيادة؟", opts: ["تطفئ الأضواء تماماً.", "تشغل أضواء الضباب، تخفف السرعة، وتزيد مسافة الأمان.", "تزيد السرعة لتخرج من منطقة الضباب بسرعة.", "تستخدم الأضواء العالية جداً (العالي)."], ans: 1 },
        { q: "من المسؤول عن الصيانة الدورية للمركبة؟", opts: ["شرطة السير.", "صاحب المركبة والسائق الذي يقودها.", "الجيران المقربون.", "وزارة التربية والتعليم."], ans: 1 },
        { q: "ماذا تفعل عند الاقتراب من باص مدرسة يتوقف للتحميل؟", opts: ["تتجاوزه بسرعة كبيرة.", "تتمهل وتتوقع ظهور أطفال فجأة من خلفه أو أمامه.", "تتوقف خلفه وتنتظر حتى يتحرك تماماً.", "تستخدم الزامور ليتحرك الباص بسرعة."], ans: 1 },
        { q: "ما هو التصرف الصحيح عند وقوع حادث طرق بدون إصابات؟", opts: ["ترك المركبات في مكانها وانتظار الشرطة لساعات.", "تصوير الحادث، تبادل التفاصيل، وإخلاء الطريق فوراً لتجنب الازدحام.", "المشاجرة مع الطرف الآخر لمعرفة المخطئ.", "الهروب من المكان فوراً."], ans: 1 }
    ];

    const container = document.getElementById('questionsWrapper');
    fullQuizData.forEach((item, index) => {
        let qHtml = `<div class="question-block">
            <div class="question-text">${index + 1}. ${item.q}</div>`;
        item.opts.forEach((opt, i) => {
            qHtml += `<label class="option-label"><input type="radio" name="q${index}" value="${i}"> ${opt}</label>`;
        });
        qHtml += `</div>`;
        container.innerHTML += qHtml;
    });

    function evaluateQuiz() {
        let score = 0;
        fullQuizData.forEach((item, index) => {
            const selected = document.querySelector(`input[name="q${index}"]:checked`);
            if (selected && parseInt(selected.value) === item.ans) score++;
        });

        const resultBox = document.getElementById('result-box');
        resultBox.style.display = "block";
        if (score >= 26) {
            resultBox.className = "passed";
            resultBox.innerHTML = "تهانينا! لقد نجحت في الاختبار. نتيجتك هي " + score + " من 30.";
        } else {
            resultBox.className = "failed";
            resultBox.innerHTML = "للأسف لم تنجح. نتيجتك هي " + score + " من 30. النجاح يتطلب 26 إجابة صحيحة.";
        }
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
